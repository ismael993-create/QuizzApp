<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="icon" type="image/x-icon" href="/img/logo.png">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <!-- Bootstrap Files -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body onload="init()">

    <nav class="navbar bg-body-tertiary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Quizapp</span>
        </div>
    </nav>



    <div class="container">
        <div class="card quiz_card">
            <div class="order" id="order">
                <div class="blue">
                    <img src="./img/brain result.png" alt="" style="width: 100px; padding: 10px;">
                    <p>Viel Erfolg!</p>
                </div>
                <div class="order2">
                    <div class="card-body" id="question-body">
                        <h5 class="card-title" id="questionText">Frage</h5>

                        <div class="card quiz_answer mb-2" onclick="answer('answer1')">
                            <div class="card-body" id="answer1">Antwort</div>
                        </div>
                        <div class="card quiz_answer mb-2" onclick="answer('answer2')">
                            <div class="card-body" id="answer2">Antwort</div>
                        </div>
                        <div class="card quiz_answer mb-2" onclick="answer('answer3')">
                            <div class="card-body" id="answer3">Antwort</div>
                        </div>
                        <div class="card quiz_answer mb-2" onclick="answer('answer4')">
                            <div class="card-body" id="answer4">Antwort</div>
                        </div>
                        <div class="progress">
                            <div class="progress-bar progress-bar-striped" id="progress_bar" role="progressbar"
                                style="width: 25%; background-color: rgb(78, 115, 115) !important;" aria-valuenow="25"
                                aria-valuemin="0" aria-valuemax="100"><span id="progress_prozent"></span></div>
                        </div>
                    </div>

                    <div class="question_footer">
                        <span>
                            <b id="question-Number">1</b> von <b id="all_questions"></b> Fragen
                        </span>
                        <button id="next-button" class="btn btn-primary" disabled onclick="nextQuestion()">Nächste
                            Frage</button>

                    </div>
                </div>
            </div>

            <div id="end-screen" class="endScreen" style="display: none;">
                <div>
                    <h2>Quiz beendet!</h2>
                    <div class="progress">
                        <div class="progress-bar progress-bar-striped" role="progressbar"
                            style="width: 100% !important; background-color: rgb(78, 115, 115) !important;"
                            aria-valuemax="100"><span>100%</span></div>
                    </div>
                </div>
                <div style="width: 100%; overflow: hidden;">
                    <img src="./img/pokal.jpg" alt="" style="width: 100%; height: auto;">
                </div>


                <div>
                    Du hast <span id="correct-answers"></span> von <span id="amount_of_questions"></span> Fragen richtig
                    beantwortet.
                </div>
                <button class="btn btn-success" onclick="restartQuiz()">Erneut spielen</button>
            </div>

</body>

</html>
